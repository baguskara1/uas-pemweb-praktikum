<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="neonGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccff00"/>
      <stop offset="100%" stop-color="#88dd00"/>
    </linearGradient>
    <linearGradient id="magentaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff1493"/>
      <stop offset="50%" stop-color="#ff0066"/>
      <stop offset="100%" stop-color="#cc0055"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Inverted triangle -->
  <polygon points="200,40 40,340 360,340" fill="url(#neonGreen)" stroke="#111" stroke-width="8" stroke-linejoin="round"/>

  <!-- Inner triangle highlight -->
  <polygon points="200,65 65,320 335,320" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Fist + Wrench -->
  <g transform="translate(200, 155)">
    <!-- Wrench handle -->
    <rect x="-45" y="-6" width="90" height="12" rx="3" fill="#888" stroke="#111" stroke-width="3"/>
    <!-- Wrench head left -->
    <path d="M-45 -6 L-58 -18 L-54 -24 L-42 -12 Z" fill="#888" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-45 6 L-58 18 L-54 24 L-42 12 Z" fill="#888" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
    <!-- Wrench head right -->
    <path d="M45 -6 L58 -18 L54 -24 L42 -12 Z" fill="#888" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
    <path d="M45 6 L58 18 L54 24 L42 12 Z" fill="#888" stroke="#111" stroke-width="3" stroke-linejoin="round"/>

    <!-- Fist (simplified) -->
    <!-- Palm -->
    <rect x="-14" y="-16" width="28" height="32" rx="6" fill="#fff" stroke="#111" stroke-width="3.5"/>
    <!-- Thumb wrapping top -->
    <ellipse cx="-10" cy="-18" rx="10" ry="8" fill="#fff" stroke="#111" stroke-width="3"/>
    <!-- Knuckles -->
    <rect x="-12" y="-14" width="8" height="7" rx="2.5" fill="#e8e8e8" stroke="#111" stroke-width="1.5"/>
    <rect x="-2" y="-16" width="8" height="7" rx="2.5" fill="#e8e8e8" stroke="#111" stroke-width="1.5"/>
    <rect x="8" y="-14" width="6" height="7" rx="2.5" fill="#e8e8e8" stroke="#111" stroke-width="1.5"/>
    <!-- Wrench center detail -->
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#666" stroke="#111" stroke-width="2"/>
  </g>

  <!-- Speed lines behind triangle -->
  <g stroke="#111" stroke-width="3" stroke-linecap="round" opacity="0.4">
    <line x1="50" y1="360" x2="10" y2="380"/>
    <line x1="350" y1="360" x2="390" y2="380"/>
    <line x1="70" y1="350" x2="30" y2="370"/>
    <line x1="330" y1="350" x2="370" y2="370"/>
  </g>

  <!-- Top text: BENGKEL -->
  <text x="200" y="240" text-anchor="middle" font-family="'Arial Black', Impact, Arial, sans-serif"
        font-weight="900" font-size="28" fill="url(#silverGrad)" stroke="#111" stroke-width="2.5"
        letter-spacing="6">
    BENGKEL
  </text>

  <!-- Middle text: RACING CIHUY -->
  <text x="200" y="293" text-anchor="middle" font-family="'Arial Black', Impact, Arial, sans-serif"
        font-weight="900" font-size="46" fill="url(#magentaGrad)" stroke="#111" stroke-width="3"
        letter-spacing="2" font-style="italic" transform="skewX(-8)">
    RACING CIHUY
  </text>

  <!-- Bottom banner ribbon -->
  <path d="M70,310 L330,310 L340,328 L330,346 L70,346 L60,328 Z"
        fill="#444" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
  <!-- Banner highlight -->
  <path d="M70,310 L330,310 L340,328 L330,346 L70,346 L60,328 Z"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- WA number text -->
  <text x="200" y="338" text-anchor="middle" font-family="Arial, sans-serif"
        font-weight="800" font-size="18" fill="#fff" letter-spacing="3">
    0831-8874-9121
  </text>

  <!-- Star / spark at bottom -->
  <g transform="translate(200, 380)" fill="url(#goldGrad)" stroke="#111" stroke-width="2.5">
    <polygon points="0,-18 5,-6 18,-6 8,3 12,16 0,9 -12,16 -8,3 -18,-6 -5,-6" />
  </g>

  <!-- Small sparks -->
  <g fill="url(#goldGrad)" stroke="#111" stroke-width="1.5">
    <circle cx="175" cy="375" r="3"/>
    <circle cx="228" cy="370" r="2.5"/>
    <circle cx="190" cy="395" r="2"/>
    <circle cx="215" cy="392" r="2.5"/>
  </g>
</svg>
